<!doctype html>
<html lang="it">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tribunale di Milano – Uffici & Posizioni</title>

  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0b1220" />

  <style>
    :root{
      --bg:#0b1220;
      --card:#101a2f;
      --muted:#9fb0d0;
      --text:#e9eefb;
      --accent:#4E738A;
      --border:rgba(255,255,255,.12);
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font:16px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background: radial-gradient(1200px 600px at 20% 0%, rgba(78,115,138,.35), transparent 60%),
                  radial-gradient(900px 500px at 80% 10%, rgba(159,176,208,.18), transparent 55%),
                  var(--bg);
      color:var(--text);
      padding:28px;
    }
    .wrap{max-width:980px;margin:0 auto}
    header{
      display:flex; gap:14px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap;
      margin-bottom:18px;
    }
    h1{font-size:22px;margin:0}
    .sub{color:var(--muted); font-size:13px; margin-top:6px}
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), transparent 35%), var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .grid{
      display:grid; grid-template-columns: 1fr 1fr;
      gap:14px;
    }
    @media (max-width: 760px){ .grid{grid-template-columns:1fr} }
    label{display:block; font-size:13px; color:var(--muted); margin:0 0 6px}
    select,input,textarea{
      width:100%;
      padding:12px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color:var(--text);
      outline:none;
    }
    select:focus,input:focus{
      border-color: rgba(78,115,138,.8);
      box-shadow:0 0 0 3px rgba(78,115,138,.25)
    }
    .result{
      margin-top:14px;
      padding:14px;
      border-radius:12px;
      border:1px dashed rgba(255,255,255,.18);
      background: rgba(0,0,0,.12);
      min-height:74px;
    }
    .result .title{font-weight:700}
    .result .pos{margin-top:6px; color:var(--text)}
    .result .meta{margin-top:8px; color:var(--muted); font-size:12px}
    .row{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:space-between;
      margin-top:12px;
    }
    button{
      border:1px solid var(--border);
      background: rgba(255,255,255,.05);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
    }
    button:hover{border-color: rgba(78,115,138,.8)}
    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding:8px 10px; border-radius:999px;
      border:1px solid var(--border);
      color:var(--muted); font-size:12px;
      background: rgba(255,255,255,.03);
    }
    .ok{color:#c7ffd3}
    .warn{color:#ffd2a8}
    footer{margin-top:14px; color:var(--muted); font-size:12px}
    .small{font-size:12px; color:var(--muted)}
    code{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Uffici & Posizioni – Palazzo di Giustizia (Milano)</h1>
      <div class="sub">Seleziona <b>Ambito</b> → <b>Ufficio/Sezione</b>, oppure cerca per parole chiave.</div>
    </div>
    <div class="pill" id="countPill">0 voci</div>
  </header>

  <div class="card">
    <div class="grid">
      <div>
        <label for="ambito">Ambito</label>
        <select id="ambito"></select>
      </div>
      <div>
        <label for="voce">Ufficio / Sezione</label>
        <select id="voce"></select>
      </div>
      <div>
        <label for="q">Ricerca rapida (facoltativa)</label>
        <input id="q" type="search" placeholder="Es. 'Volontaria', 'iscrizioni a ruolo', 'Freguglia'…" />
        <div class="small">Suggerimento: la ricerca filtra la seconda tendina (Ufficio/Sezione) nell’ambito selezionato.</div>
      </div>
      <div>
        <label for="posManuale">Posizione (solo lettura)</label>
        <textarea id="posManuale" readonly rows="4" placeholder="Seleziona una voce per vedere la posizione…"></textarea>
        <div class="small">Puoi copiare la posizione (Ctrl/Cmd+C).</div>
      </div>
    </div>

    <div class="result" id="result">
      <div class="title">—</div>
      <div class="pos">Seleziona una voce.</div>
      <div class="meta"></div>
    </div>

    <div class="row">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button id="copyBtn" type="button">Copia posizione</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
      <div class="small" id="status"></div>
    </div>
  </div>
</div>

  document.body.innerHTML = `
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0b1220;
      color:#e9eefb;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      padding:24px;

      <div>
        <h2 style="margin-bottom:12px;">Beta chiusa</h2>
        <p>Il periodo di test è terminato.</p>
      </div>
    </div>

  throw new Error("Beta scaduta");
}

if (sessionStorage.getItem(ACCESS_KEY) !== "yes") {
  const entered = prompt("Inserisci la password per accedere alla beta:");

      <div style="
        min-height:100vh;

    throw new Error("Accesso negato");

}

const $ = (id) => document.getElementById(id);
const ambitoSel = $("ambito");
const voceSel = $("voce");
const q = $("q");
const posManuale = $("posManuale");
const result = $("result");
const status = $("status");
const countPill = $("countPill");

function uniq(arr){ return [...new Set(arr)].sort((a,b)=>a.localeCompare(b,'it')); }

function setStatus(msg, kind=""){
  status.textContent = msg || "";
  status.className = "small " + (kind ? kind : "");
}

function populateAmbiti(){
  const ambiti = uniq(DATA.map(d=>d.ambito));
  ambitoSel.innerHTML = "";
  for(const a of ambiti){
    const opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    ambitoSel.appendChild(opt);
  }
}

function filteredItems(){
  const amb = ambitoSel.value;
  const query = (q.value || "").trim().toLowerCase();
  let items = DATA.filter(d=>d.ambito===amb);
  if(query){
    items = items.filter(d =>
      d.voce.toLowerCase().includes(query) ||
      d.posizione.toLowerCase().includes(query) ||
      (d.email||'').toLowerCase().includes(query) ||
      (d.telefono||'').toLowerCase().includes(query)
    );
  }
  return items.sort((x,y)=>x.voce.localeCompare(y.voce,'it'));
}

function populateVoci(keepSelection=false){
  const items = filteredItems();
  const prev = voceSel.value;
  voceSel.innerHTML = "";

  for(const it of items){
    const opt = document.createElement("option");
    opt.value = it.voce;
    opt.textContent = it.voce;
    voceSel.appendChild(opt);
  }

  if(keepSelection && [...voceSel.options].some(o=>o.value===prev)){
    voceSel.value = prev;
  }

  if(items.length === 0){
    setStatus("Nessun risultato nell'ambito selezionato (prova a svuotare la ricerca).", "warn");
    showEmpty();
  } else {
    setStatus("");
    updateResult();
  }
}

function showEmpty(){
  posManuale.value = "";
  result.querySelector(".title").textContent = "—";
  result.querySelector(".pos").textContent = "Nessuna voce selezionata.";
  result.querySelector(".meta").textContent = "";
}

function updateResult(){
  const amb = ambitoSel.value;
  const voce = voceSel.value;
  const item = DATA.find(d => d.ambito===amb && d.voce===voce);
  if(!item){ showEmpty(); return; }

  const lines = [];
  if(item.posizione) lines.push(item.posizione);
  if(item.email) lines.push(`Email: ${item.email}`);
  if(item.telefono) lines.push(`Telefono: ${item.telefono}`);
  if(item.pec) lines.push(`PEC: ${item.pec}`);

  posManuale.value = lines.join("\n");

  result.querySelector(".title").textContent = item.voce;
  result.querySelector(".pos").textContent = item.posizione || "—";

  const metaBits = [`Ambito: ${item.ambito}`];
  if(item.email) metaBits.push(`Email: ${item.email}`);
  if(item.telefono) metaBits.push(`Tel: ${item.telefono}`);
  if(item.pec) metaBits.push(`PEC: ${item.pec}`);
  result.querySelector(".meta").textContent = metaBits.join(" • ");
}

function copyPos(){
  const txt = posManuale.value.trim();
  if(!txt){
    setStatus("Niente da copiare (seleziona prima una voce).", "warn");
    return;
  }
  navigator.clipboard.writeText(txt).then(()=>{
    setStatus("Posizione copiata negli appunti.", "ok");
    setTimeout(()=>setStatus(""), 1600);
  }).catch(()=>{
    try{
      posManuale.focus();
      posManuale.select();
      document.execCommand("copy");
      setStatus("Posizione copiata (fallback).", "ok");
      setTimeout(()=>setStatus(""), 1600);
    }catch(e){
      setStatus("Copia non riuscita: seleziona manualmente il testo e copia.", "warn");
    }
  });
}

function resetAll(){
  q.value = "";
  populateVoci(false);
  setStatus("Reset effettuato.", "ok");
  setTimeout(()=>setStatus(""), 1200);
}

function init(){
  countPill.textContent = `${DATA.length} voci`;
  populateAmbiti();
  populateVoci(false);
  ambitoSel.addEventListener("change", ()=>{ q.value=""; populateVoci(false); });
  voceSel.addEventListener("change", updateResult);
  q.addEventListener("input", ()=>populateVoci(true));
  $("copyBtn").addEventListener("click", copyPos);
  $("resetBtn").addEventListener("click", resetAll);
  updateResult();
}
init();
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>
